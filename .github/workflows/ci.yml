name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply (dev/prod)'
        required: true
        default: 'dev'
      auto_approve:
        description: 'Set to "true" to auto-approve apply'
        required: false
        default: 'false'

jobs:
  terraform:
    name: Terraform CI
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade
        working-directory: terraform/environments/dev

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        working-directory: terraform/environments/dev

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -no-color -out=tfplan
        working-directory: terraform/environments/dev

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev/tfplan

  apply:
    name: Terraform Apply
    needs: terraform
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[apply]'))
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev

      # 🔥 AJOUT CRITIQUE (manquait chez toi)
      - name: Terraform Init (apply)
        run: terraform init -input=false -upgrade
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -input=false -auto-approve tfplan
        working-directory: terraform/environments/dev