name: CI

on:
  push:
    branches: ["main", "vulnerable"]
  pull_request:
    branches: ["main", "vulnerable"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply (dev/prod)'
        required: true
        default: 'dev'
      auto_approve:
        description: 'Set to "true" to auto-approve apply'
        required: false
        default: 'false'

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade
        working-directory: terraform/environments/dev

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        working-directory: terraform/environments/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/dev

      - name: tfsec - Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -no-color -out=tfplan
        working-directory: terraform/environments/dev
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}

  apply:
    name: Terraform Apply
    needs: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -input=false -auto-approve
        working-directory: terraform/environments/dev
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}