name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply (dev/prod)'
        required: true
        default: 'dev'
      auto_approve:
        description: 'Set to "true" to auto-approve apply'
        required: false
        default: 'false'

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade
        working-directory: terraform/environments/dev

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        working-directory: terraform/environments/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -no-color -out=tfplan
        working-directory: terraform/environments/dev

      # --- Upload artifacts for apply job ---
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev/tfplan

      - name: Upload Terraform Lock file
        uses: actions/upload-artifact@v4
        with:
          name: terraform-lock
          path: terraform/environments/dev/.terraform.lock.hcl

  apply:
    name: Terraform Apply
    needs: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # --- Download artifacts from plan job ---
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev

      - name: Download Terraform Lock file
        uses: actions/download-artifact@v4
        with:
          name: terraform-lock
          path: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -input=false -auto-approve tfplan
        working-directory: terraform/environments/dev